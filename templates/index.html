<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>区块链原理模拟器</title>
    <style>
        :root {
          --primary: #1a1a2e;
          --secondary: #16213e;
          --accent: #0f3460;
          --text: #e6e6e6;
          --background: #0b0d1a;
          --card-bg: #141a33;
          --muted: #aab2d0;
          --gradient: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
        }

        * { box-sizing: border-box; }
        body {
          margin: 0;
          min-height: 100vh;
          background: var(--background);
          color: var(--text);
          font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .app-header {
          padding: 18px 24px;
          background: linear-gradient(135deg, #101a33 0%, #1f2651 100%);
          border-bottom: 1px solid #1e2746;
        }

        .header-content {
          max-width: 1400px;
          margin: 0 auto;
          display: flex;
          justify-content: space-between;
          align-items: center;
          gap: 12px;
          flex-wrap: wrap;
        }

        .app-header h1 {
          margin: 0;
          font-size: 1.6rem;
        }

        .header-stats {
          display: flex;
          align-items: center;
          gap: 8px;
        }

        .status-badge,
        .difficulty-badge {
          color: #fff;
          padding: 6px 12px;
          border-radius: 20px;
          font-weight: 500;
          font-size: 0.95rem;
        }

        .status-valid {
          background: rgba(16, 172, 132, 0.4);
          border: 1px solid rgba(16, 172, 132, 0.8);
        }

        .status-invalid {
          background: rgba(255, 107, 107, 0.3);
          border: 1px solid rgba(255, 107, 107, 0.8);
        }

        .difficulty-badge {
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          border: none;
        }

        .main-content {
          max-width: 1400px;
          margin: 20px auto;
          padding: 20px;
          display: grid;
          grid-template-columns: 1fr 360px;
          gap: 20px;
        }

        .blocks-section,
        .sidebar {
          background: var(--card-bg);
          border-radius: 12px;
          padding: 18px;
          box-shadow: 0 8px 25px rgba(0, 0, 0, 0.35);
        }

        .section-header,
        .panel h3 {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 16px;
          color: var(--text);
        }

        .btn-refresh,
        .btn-primary,
        .btn-secondary,
        .btn-danger {
          cursor: pointer;
          border-radius: 8px;
          padding: 12px 20px;
          border: none;
          font-weight: 500;
          transition: all 0.3s ease;
        }

        .btn-primary {
          background: var(--gradient);
          color: #fff;
          display: inline-flex;
          align-items: center;
          gap: 8px;
        }

        .btn-primary:hover,
        .btn-refresh:hover {
          transform: translateY(-2px);
          box-shadow: 0 6px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
          background: #f8f9fa;
          color: var(--primary);
          border: 1px solid #dee2e6;
        }

        .btn-danger {
          background: #ff4757;
          color: #fff;
        }

        .input-group {
          position: relative;
          margin-bottom: 16px;
        }

        .input-group input,
        .input-group select,
        .input-group button {
          width: 100%;
          padding: 12px 14px;
          border: 2px solid #e0e0e0;
          border-radius: 8px;
          font-size: 16px;
          background: #ffffff;
          color: #2d3436;
        }

        .input-group input:focus,
        .input-group select:focus {
          border-color: var(--secondary);
          outline: none;
          box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .block-card {
          background: #070b1e;
          border-radius: 12px;
          padding: 18px;
          margin-bottom: 16px;
          box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
          border-left: 4px solid var(--secondary);
          transition: all 0.3s ease;
          position: relative;
          overflow: hidden;
          animation: fadeIn 0.5s ease-out;
        }

        .block-card:hover {
          transform: translateY(-2px);
          box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }

        .block-card:before {
          content: '';
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          height: 3px;
          background: var(--gradient);
        }

        .block-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 14px;
          padding-bottom: 10px;
          border-bottom: 1px solid #2f3c62;
        }

        .block-number {
          font-size: 1.1em;
          font-weight: 700;
          color: var(--text);
          background: #0f1a3d;
          padding: 5px 14px;
          border-radius: 20px;
        }

        .block-body {
          display: grid;
          gap: 8px;
          color: var(--muted);
          font-size: 0.95rem;
        }

        .data-field label {
          font-weight: 600;
          color: var(--text);
        }

        .data-value,
        .hash-value {
          background: #0f1a3d;
          padding: 8px 10px;
          border-radius: 8px;
          font-family: 'Monaco', 'Consolas', monospace;
          word-break: break-all;
          border: 1px solid #2a3a64;
          color: #d8e7ff;
        }

        .chart-container {
          background: #070b1e;
          border-radius: 12px;
          padding: 18px;
          box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
          margin-bottom: 16px;
        }

        .lesson-panel {
          background: #070b1e;
          border-radius: 12px;
          padding: 18px;
          margin-bottom: 16px;
          border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .lesson-panel h3 {
          margin-bottom: 14px;
          color: #f8f9fa;
        }

        .lesson-tip {
          color: #cfd8ff;
          line-height: 1.7;
          font-size: 0.96rem;
        }

        .chart-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 12px;
          padding-bottom: 10px;
          border-bottom: 1px solid #2f3c62;
        }

        .chart-title {
          font-size: 1.05em;
          font-weight: 600;
          color: var(--text);
        }

        .chart-legend {
          display: flex;
          gap: 10px;
          color: #9eb1d8;
        }

        .notification {
          position: fixed;
          top: 20px;
          right: 20px;
          background: #fff;
          padding: 15px 20px;
          border-radius: 8px;
          box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
          display: flex;
          align-items: center;
          gap: 10px;
          transform: translateX(150%);
          transition: transform 0.3s ease;
          z-index: 1000;
          color: #222;
        }

        .notification.show { transform: translateX(0); }
        .notification.success { border-left: 4px solid #10ac84; }
        .notification.error { border-left: 4px solid #ff6b6b; }

        @media (max-width: 1024px) {
          .main-content { grid-template-columns: 1fr; }
          .sidebar { order: -1; }
        }

        @media (max-width: 768px) {
          .main-content { padding: 10px; gap: 15px; }
          .block-card { padding: 15px; }
          .btn-primary, .btn-secondary, .btn-refresh { padding: 10px 16px; font-size: 14px; }
          .chart-container { padding: 15px; }
        }

        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(10px); }
          to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
          0%, 100% { transform: scale(1); }
          50% { transform: scale(1.05); }
        }

        .block-added { animation: pulse 0.3s ease; }
    </style>
</head>
<body>
    <header class="app-header">
      <div class="header-content">
        <h1>🔗 区块链原理模拟器</h1>
        <div class="header-stats">
          <span id="statusBadge" class="status-badge status-valid">链状态：有效</span>
          <span class="difficulty-badge" id="difficulty">难度：4</span>
        </div>
      </div>
    </header>

    <main class="main-content">
      <section class="blocks-section">
        <div class="section-header">
          <h2>区块链</h2>
          <button id="validateBtn" class="btn-secondary">验证区块链</button>
        </div>
        <div id="chain"></div>

        <h3 style="margin-top: 20px; color: #e6e6e6;">操作</h3>
        <form id="addBlockForm" class="input-group">
          <input type="text" id="data" placeholder="输入区块数据" required>
          <button class="btn-primary" type="submit">⛏️ 添加区块</button>
        </form>

        <form id="tamperForm" class="input-group">
          <input type="number" id="index" placeholder="区块索引" min="1" required>
          <input type="text" id="new_data" placeholder="新数据" required>
          <button class="btn-danger" type="submit">⚠️ 篡改</button>
        </form>

        <form id="difficultyForm" class="input-group">
          <label for="difficultyInput">设置难度：</label>
          <input id="difficultyInput" type="number" min="1" max="6" value="4">
          <button class="btn-secondary" type="submit">更新难度</button>
        </form>
      </section>

      <aside class="sidebar">
        <div class="lesson-panel">
          <h3>🧠 教学提示</h3>
          <p id="lessonTip" class="lesson-tip">每个区块都包含前一个区块的哈希，保证链条不可篡改。添加新区块时会进行工作量证明，挖矿速度与难度共同决定挖矿耗时。</p>
        </div>
        <div class="panel chart-panel">
          <h3>📈 统计图表</h3>
          <div class="chart-container">
            <div class="chart-header"><span class="chart-title">挖矿速度（Nonce/秒）</span></div>
            <canvas id="chartMiningSpeed" height="180"></canvas>
          </div>
          <div class="chart-container">
            <div class="chart-header"><span class="chart-title">挖矿耗时（秒）</span></div>
            <canvas id="chartMiningTime" height="180"></canvas>
          </div>
          <div class="chart-container">
            <div class="chart-header"><span class="chart-title">链长度随时间增长</span></div>
            <canvas id="chartChainLength" height="180"></canvas>
          </div>
          <div class="chart-container">
            <div class="chart-header"><span class="chart-title">难度变化历史</span></div>
            <canvas id="chartDifficulty" height="180"></canvas>
          </div>
        </div>
      </aside>
    </main>

    <div id="notification" class="notification"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        let chartMiningSpeed, chartMiningTime, chartChainLength, chartDifficulty;
        let notificationTimer = null;

        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification show ${type}`;
            window.clearTimeout(notificationTimer);
            notificationTimer = window.setTimeout(() => {
                notification.className = 'notification';
            }, 3000);
        }

        function renderChain(chain) {
            const container = document.getElementById('chain');
            container.innerHTML = '';
            chain.forEach(block => {
                const div = document.createElement('div');
                div.className = 'block-card';
                div.innerHTML = `
                    <div class="block-header">
                      <span class="block-number">区块 #${block.index}</span>
                      <span class="block-time">${new Date(block.timestamp * 1000).toLocaleString()}</span>
                    </div>
                    <div class="block-body">
                      <div class="data-field"><label>数据：</label><div class="data-value">${block.data}</div></div>
                      <div class="data-field"><label>前哈希：</label><div class="hash-value">${block.previous_hash}</div></div>
                      <div class="data-field"><label>哈希：</label><div class="hash-value">${block.hash}</div></div>
                      <div class="data-field"><label>Nonce：</label><div class="data-value">${block.nonce}</div></div>
                      <div class="data-field"><label>难度：</label><div class="data-value">${block.difficulty}</div></div>
                      <div class="data-field"><label>挖矿耗时：</label><div class="data-value">${block.mining_time.toFixed(3)} 秒</div></div>
                      <div class="data-field"><label>挖矿速度：</label><div class="data-value">${block.mining_speed.toFixed(2)} Nonce/秒</div></div>
                    </div>
                `;
                if (block.index === chain.length - 1) {
                    div.classList.add('block-added');
                }
                container.appendChild(div);
            });
        }

        function renderLessonTip(history) {
            const tip = document.getElementById('lessonTip');
            if (!history.length) return;
            tip.textContent = history[history.length - 1].note || '每次挖矿都会记录难度、耗时和挖矿速度，帮助理解链的成长过程。';
        }

        function renderCharts(history) {
            const labels = history.map(i => new Date(i.timestamp * 1000).toLocaleTimeString());
            const miningSpeedData = history.map(i => parseFloat(i.mining_speed.toFixed(2)));
            const miningTimeData = history.map(i => parseFloat(i.mining_time.toFixed(3)));
            const chainLengthData = history.map(i => i.chain_length);
            const difficultyData = history.map(i => i.difficulty);

            function createOrUpdateChart(chartVar, id, label, data, borderColor) {
                const ctx = document.getElementById(id).getContext('2d');
                if (chartVar) {
                    chartVar.data.labels = labels;
                    chartVar.data.datasets[0].data = data;
                    chartVar.update();
                } else {
                    chartVar = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels,
                            datasets: [{ label, data, borderColor, borderWidth: 2, fill: false, tension: 0.3 }]
                        },
                        options: {
                            responsive: true,
                            plugins: { legend: { display: false } },
                            scales: { y: { beginAtZero: true }, x: { ticks: { maxRotation: 45, minRotation: 0 } } }
                        }
                    });
                }
                return chartVar;
            }

            chartMiningSpeed = createOrUpdateChart(chartMiningSpeed, 'chartMiningSpeed', 'Nonce/秒', miningSpeedData, '#2a7ccf');
            chartMiningTime = createOrUpdateChart(chartMiningTime, 'chartMiningTime', '挖矿耗时（秒）', miningTimeData, '#f1c40f');
            chartChainLength = createOrUpdateChart(chartChainLength, 'chartChainLength', '链长度', chainLengthData, '#4caf50');
            chartDifficulty = createOrUpdateChart(chartDifficulty, 'chartDifficulty', '难度', difficultyData, '#e67e22');
        }

        function updateState(state) {
            const statusBadge = document.getElementById('statusBadge');
            const difficultyEl = document.getElementById('difficulty');
            statusBadge.textContent = `链状态：${state.valid ? '有效' : '无效'}`;
            statusBadge.className = `status-badge ${state.valid ? 'status-valid' : 'status-invalid'}`;
            difficultyEl.textContent = `难度：${state.difficulty}`;
            renderChain(state.chain);
            renderCharts(state.history);
            renderLessonTip(state.history);
        }

        async function loadState() {
            const resp = await fetch('/api/chain');
            if (!resp.ok) {
                showNotification('无法加载区块链状态，请稍后重试。', 'error');
                return;
            }
            const data = await resp.json();
            updateState(data);
        }

        document.getElementById('addBlockForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const data = document.getElementById('data').value.trim();
            if (!data) return;
            const resp = await fetch('/api/mine', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({data}) });
            if (resp.ok) {
                showNotification('新区块已成功挖出，链已实时更新。');
                document.getElementById('data').value = '';
            } else {
                showNotification('新增区块失败，请检查输入。', 'error');
            }
        });

        document.getElementById('validateBtn').addEventListener('click', async function() {
            const resp = await fetch('/api/validate');
            const body = await resp.json();
            const statusBadge = document.getElementById('statusBadge');
            statusBadge.textContent = body.valid ? '链状态：有效' : '链状态：无效';
            statusBadge.className = `status-badge ${body.valid ? 'status-valid' : 'status-invalid'}`;
            showNotification(body.valid ? '链验证成功，当前状态有效。' : '链验证失败，链可能已篡改。', body.valid ? 'success' : 'error');
        });

        document.getElementById('tamperForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const index = Number(document.getElementById('index').value);
            const newData = document.getElementById('new_data').value;
            if (!newData || index < 1) return;
            const resp = await fetch('/api/tamper', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({index, new_data: newData}) });
            const result = await resp.json();
            if (resp.ok && result.success) {
                showNotification(`区块 #${index} 已篡改，链状态可能失效。`, 'error');
            } else {
                showNotification('篡改失败，请检查区块索引。', 'error');
            }
        });

        document.getElementById('difficultyForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const difficulty = Number(document.getElementById('difficultyInput').value);
            const resp = await fetch('/api/difficulty', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({difficulty}) });
            if (resp.ok) {
                const body = await resp.json();
                document.getElementById('difficulty').textContent = `难度：${body.difficulty}`;
                showNotification(`难度已更新为 ${body.difficulty}。`);
            } else {
                const body = await resp.json();
                showNotification(body.error || '难度更新失败。', 'error');
            }
        });

        const evtSource = new EventSource('/stream');
        evtSource.onmessage = function(event) {
            try {
                const payload = JSON.parse(event.data);
                if (payload.chain && payload.stats) {
                    updateState({ chain: payload.chain, valid: payload.valid, difficulty: payload.stats.length ? payload.stats[payload.stats.length - 1].difficulty : Number(document.getElementById('difficulty').textContent.replace('难度：', '')), history: payload.stats });
                    showNotification('链状态已实时更新。');
                } else if (payload.type === 'difficulty_update') {
                    document.getElementById('difficulty').textContent = `难度：${payload.difficulty}`;
                    loadState();
                    showNotification('难度已变更，图表已刷新。');
                }
            } catch (e) {
                console.error('SSE解析失败', e);
            }
        };

        loadState();
    </script>
</body>
</html>
